# Configuration pour déploiement sur Render
# IMPORTANT: Créez une DB PostgreSQL sur Render et configurez les variables ci-dessous manuellement
services:
  - type: web
    name: itaccess-backend
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      # Configurer ces variables manuellement dans le dashboard Render
      - key: DB_HOST
        value: "votre-db-host.render.com"  # Remplacer par votre host
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: "votre_database"  # Remplacer par le nom de votre DB
      - key: DB_USER
        value: "votre_user"  # Remplacer par votre utilisateur
      - key: DB_PASSWORD
        value: "votre_password"  # Remplacer par votre mot de passe
      - key: JWT_SECRET
        generateValue: true
      - key: SERVER_PORT
        value: "8000"
