spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:itaccess}}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS:org.postgresql.Driver}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

server:
  port: ${SERVER_PORT:8000}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
  
  jwt:
    secret: ${JWT_SECRET:please-change-this-in-production-use-a-secure-random-key-at-least-256-bits}
    expiration: 1800000

logging:
  level:
    com.itaccess: ${LOG_LEVEL:DEBUG}
